name: Deploy Next.js to VPS

on:
  push:
    branches:
      - fix-cleanup-2

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH into VPS and deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            export PATH=$PATH:/usr/local/bin

            cd /var/www/my-app

            # Notice git clean -fd is completely GONE from here
            git reset --hard HEAD
            git fetch origin
            git checkout fix-cleanup-2
            git reset --hard origin/fix-cleanup-2

            npm install
            
            # This extracts the variables directly from ecosystem.config.js to power the build!
            node -e "const { execSync } = require('child_process'); const config = require('./ecosystem.config.js'); const env = config.apps[0].env; execSync('npm run build', { env: Object.assign({}, process.env, env), stdio: 'inherit' });"
            
            pm2 restart triko-store