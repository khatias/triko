name: Deploy Next.js to VPS

on:
  push:
    branches:
      - fix-cleanup-2 # Trigger deployment only when this branch is updated

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH into VPS and deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/my-app
            git fetch origin
            git checkout fix-cleanup-2
            git reset --hard origin/fix-cleanup-2
            npm install
            npm run build
            pm2 restart triko-store
