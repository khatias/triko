# .github/workflows/deploy.yml

name: Deploy Next.js to VPS

on:
  push:
    branches:
      - fix-cleanup-2

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH into VPS and deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail

            APP_DIR="/var/www/my-app"
            WEB_APP="triko-store"
            SYNC_APP="triko-sync"
            PORT="3000"
            HEALTH_URL="https://beta.triko.ge/"

            echo "---- load nvm/node ----"
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            export PATH=$PATH:/usr/local/bin
            node -v
            npm -v

            cd "$APP_DIR"

            echo "---- before deploy ----"
            OLD_SHA="$(git rev-parse HEAD || true)"
            echo "OLD_SHA=${OLD_SHA}"
            pm2 status || true

            echo "---- update code ----"
            git fetch origin
            git checkout fix-cleanup-2
            git reset --hard origin/fix-cleanup-2
            NEW_SHA="$(git rev-parse HEAD)"
            echo "NEW_SHA=${NEW_SHA}"
            git --no-pager log -1 --oneline

            echo "---- decide whether to restart sync ----"
            CHANGED="$(git diff --name-only "${OLD_SHA}" "${NEW_SHA}" || true)"
            echo "$CHANGED" > /tmp/changed_files.txt || true
            NEED_SYNC_RESTART="no"
            if grep -Eiq '(^triko-sync/|sync|fina|jobs|cron|pm2|ecosystem\.config\.js|package\.json|package-lock\.json)' /tmp/changed_files.txt; then
              NEED_SYNC_RESTART="yes"
            fi
            echo "NEED_SYNC_RESTART=${NEED_SYNC_RESTART}"

            echo "---- stop web before building (prevents missing chunk issues) ----"
            pm2 stop "$WEB_APP" || true
            pm2 status || true

            echo "---- clean build output ----"
            rm -rf .next

            echo "---- install dependencies ----"
            if [ -f package-lock.json ]; then
              npm ci
            else
              npm install
            fi

            echo "---- load env FROM ecosystem.config.js for build ----"
            # This makes the build environment match what PM2 uses at runtime.
            # It exports env for the app named WEB_APP (triko-store).
            eval "$(
              node - <<'NODE'
              const fs = require("fs");
              const path = require("path");

              const appName = process.env.WEB_APP_NAME || "triko-store";
              const p = path.join(process.cwd(), "ecosystem.config.js");

              if (!fs.existsSync(p)) {
                console.error("ecosystem.config.js not found at", p);
                process.exit(1);
              }

              // Load ecosystem config (CommonJS)
              const cfg = require(p);
              const apps = cfg.apps || cfg;
              const arr = Array.isArray(apps) ? apps : (apps.apps || []);
              const app = arr.find(a => a && a.name === appName) || arr[0];

              if (!app) {
                console.error("No apps found in ecosystem.config.js");
                process.exit(1);
              }

              // Prefer env_production, fallback to env
              const env = Object.assign({}, app.env || {}, app.env_production || {});
              // Print export statements (shell-safe)
              for (const [k, v] of Object.entries(env)) {
                if (v === undefined || v === null) continue;
                const s = String(v);
                // Single-quote escape for bash: ' -> '\'' 
                const safe = s.replace(/'/g, `'\\''`);
                process.stdout.write(`export ${k}='${safe}'\n`);
              }
              NODE
            )"

            # Ensure basic things are set (ecosystem may already include them)
            export NODE_ENV="${NODE_ENV:-production}"
            export PORT="${PORT:-3000}"

            echo "Loaded env for build (showing a few non-sensitive keys):"
            node -e "console.log({ NODE_ENV: process.env.NODE_ENV, PORT: process.env.PORT, HAS_RESEND: !!process.env.RESEND_API_KEY })"

            echo "---- build ----"
            npm run build

            echo "---- restart web (update env) ----"
            pm2 restart "$WEB_APP" --update-env
            pm2 save || true
            pm2 status || true

            echo "---- optional: restart triko-sync if relevant files changed ----"
            if [ "$NEED_SYNC_RESTART" = "yes" ]; then
              echo "Sync-related changes detected -> restarting ${SYNC_APP}"
              pm2 restart "$SYNC_APP" --update-env || true
              pm2 save || true
            else
              echo "No sync-related changes -> leaving ${SYNC_APP} running"
            fi

            echo "---- local upstream readiness (bypass nginx) ----"
            READY="no"
            for i in $(seq 1 30); do
              if curl -fsS "http://127.0.0.1:${PORT}/" >/dev/null; then
                echo "OK: upstream responded on 127.0.0.1:${PORT}"
                READY="yes"
                break
              fi
              echo "waiting for upstream... ($i/30)"
              sleep 1
            done

            if [ "$READY" != "yes" ]; then
              echo "FAILED: upstream never became ready on 127.0.0.1:${PORT}"
              pm2 status || true
              pm2 logs "$WEB_APP" --lines 200 --nostream || true
              exit 1
            fi

            echo "---- nginx/domain health check (retry) ----"
            OK="no"
            for i in $(seq 1 30); do
              CODE="$(curl -sS -o /dev/null -w "%{http_code}" "${HEALTH_URL}" || true)"
              if [ "$CODE" = "200" ] || [ "$CODE" = "301" ] || [ "$CODE" = "302" ]; then
                echo "OK: ${HEALTH_URL} returned ${CODE}"
                OK="yes"
                break
              fi

              echo "health check got ${CODE} ($i/30)"

              if [ "$i" = "5" ] || [ "$i" = "15" ] || [ "$i" = "25" ]; then
                pm2 status || true
                pm2 describe "$WEB_APP" || true
                pm2 logs "$WEB_APP" --lines 120 --nostream || true
                sudo tail -n 80 /var/log/nginx/error.log || true
              fi

              sleep 1
            done

            if [ "$OK" != "yes" ]; then
              echo "FAILED: ${HEALTH_URL} never became healthy"
              pm2 status || true
              pm2 logs "$WEB_APP" --lines 250 --nostream || true
              sudo tail -n 120 /var/log/nginx/error.log || true
              exit 1
            fi

            echo "---- deploy done ----"
