# .github/workflows/deploy.yml
# Full fixed deploy script: safe update, clean build, restart with updated env,
# retry health checks, and strong diagnostics on failure.

name: Deploy Next.js to VPS

on:
  push:
    branches:
      - fix-cleanup-2

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH into VPS and deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail

            # ---- CONFIG ----
            APP_DIR="/var/www/my-app"
            WEB_APP="triko-store"
            SYNC_APP="triko-sync"
            PORT="3000"
            HEALTH_URL="https://beta.triko.ge/"

            echo "---- load nvm/node ----"
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            export PATH=$PATH:/usr/local/bin

            node -v
            npm -v

            echo "---- before deploy ----"
            cd "$APP_DIR"
            OLD_SHA="$(git rev-parse HEAD || true)"
            echo "OLD_SHA=${OLD_SHA}"
            pm2 status || true

            echo "---- update code ----"
            git fetch origin
            git checkout fix-cleanup-2
            git reset --hard origin/fix-cleanup-2
            NEW_SHA="$(git rev-parse HEAD)"
            echo "NEW_SHA=${NEW_SHA}"
            git --no-pager log -1 --oneline

            echo "---- decide whether to restart sync ----"
            # Restart sync only if files likely related to sync changed.
            # Adjust patterns to match your repo.
            CHANGED="$(git diff --name-only "${OLD_SHA}" "${NEW_SHA}" || true)"
            echo "$CHANGED" > /tmp/changed_files.txt || true

            NEED_SYNC_RESTART="no"
            if grep -Eiq '(^triko-sync/|sync|fina|jobs|cron|pm2|ecosystem\.config\.js|package\.json|package-lock\.json)' /tmp/changed_files.txt; then
              NEED_SYNC_RESTART="yes"
            fi

            echo "NEED_SYNC_RESTART=${NEED_SYNC_RESTART}"

            echo "---- stop web before building (prevents missing chunk issues) ----"
            pm2 stop "$WEB_APP" || true
            pm2 status || true

            echo "---- clean build output ----"
            rm -rf .next

            echo "---- install dependencies ----"
            # If you have a lockfile, prefer npm ci:
            if [ -f package-lock.json ]; then
              npm ci
            else
              npm install
            fi

            echo "---- build with env from ecosystem.config.js ----"
            # IMPORTANT: your ecosystem config must contain all env vars needed for build
            npm run build

            echo "---- restart web (update env) ----"
            # --update-env ensures PM2 refreshes env values from ecosystem/config
            pm2 restart "$WEB_APP" --update-env
            pm2 save || true
            pm2 status || true

            echo "---- optional: restart triko-sync if relevant files changed ----"
            if [ "$NEED_SYNC_RESTART" = "yes" ]; then
              echo "Sync-related changes detected -> restarting ${SYNC_APP}"
              pm2 restart "$SYNC_APP" --update-env || true
              pm2 save || true
            else
              echo "No sync-related changes -> leaving ${SYNC_APP} running"
            fi

            echo "---- local upstream readiness (bypass nginx) ----"
            # This confirms the Node server is actually listening.
            READY="no"
            for i in $(seq 1 30); do
              if curl -fsS "http://127.0.0.1:${PORT}/" >/dev/null; then
                echo "OK: upstream responded on 127.0.0.1:${PORT}"
                READY="yes"
                break
              fi
              echo "waiting for upstream... ($i/30)"
              sleep 1
            done

            if [ "$READY" != "yes" ]; then
              echo "FAILED: upstream never became ready on 127.0.0.1:${PORT}"
              echo "---- pm2 status ----"
              pm2 status || true
              echo "---- pm2 logs (${WEB_APP}) ----"
              pm2 logs "$WEB_APP" --lines 200 --nostream || true
              exit 1
            fi

            echo "---- nginx/domain health check (retry) ----"
            OK="no"
            for i in $(seq 1 30); do
              CODE="$(curl -sS -o /dev/null -w "%{http_code}" "${HEALTH_URL}" || true)"
              if [ "$CODE" = "200" ] || [ "$CODE" = "301" ] || [ "$CODE" = "302" ]; then
                echo "OK: ${HEALTH_URL} returned ${CODE}"
                OK="yes"
                break
              fi

              echo "health check got ${CODE} ($i/30)"

              # On a few attempts, print diagnostics without failing immediately
              if [ "$i" = "5" ] || [ "$i" = "15" ] || [ "$i" = "25" ]; then
                echo "---- debug snapshot ----"
                pm2 status || true
                pm2 describe "$WEB_APP" || true
                echo "---- pm2 logs (${WEB_APP}) ----"
                pm2 logs "$WEB_APP" --lines 120 --nostream || true
                echo "---- nginx error log (last 80) ----"
                sudo tail -n 80 /var/log/nginx/error.log || true
              fi

              sleep 1
            done

            if [ "$OK" != "yes" ]; then
              echo "FAILED: ${HEALTH_URL} never became healthy"
              echo "---- pm2 status ----"
              pm2 status || true
              echo "---- pm2 logs (${WEB_APP}) ----"
              pm2 logs "$WEB_APP" --lines 250 --nostream || true
              echo "---- nginx error log (last 120) ----"
              sudo tail -n 120 /var/log/nginx/error.log || true
              exit 1
            fi

            echo "---- deploy done ----"
